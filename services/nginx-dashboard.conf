# Nginx reverse proxy for Christina Dashboard
# Install: apt install nginx certbot python3-certbot-nginx
# Deploy: cp services/nginx-dashboard.conf /etc/nginx/sites-available/dashboard
#         ln -sf /etc/nginx/sites-available/dashboard /etc/nginx/sites-enabled/
#         certbot --nginx -d dashboard.groundup.vc  # or your domain
#         systemctl reload nginx
#
# This config:
#   - Terminates TLS (via certbot/Let's Encrypt)
#   - Adds HSTS header (tells browsers to always use HTTPS)
#   - Adds Content-Security-Policy header
#   - Proxies to Next.js on localhost:3000
#   - Rate limits at the proxy level (defense in depth)
#   - Blocks direct IP access (only allows configured domain)

# Rate limiting zone: 10 requests/second per IP with 10MB shared memory
limit_req_zone $binary_remote_addr zone=dashboard:10m rate=10r/s;

# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name dashboard.groundup.vc;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dashboard.groundup.vc;

    # TLS — managed by certbot (these lines will be auto-populated)
    # ssl_certificate /etc/letsencrypt/live/dashboard.groundup.vc/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/dashboard.groundup.vc/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (supplement Next.js headers)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' https://lh3.googleusercontent.com data:; connect-src 'self'; font-src 'self'; frame-ancestors 'none';" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Request size limit (protects against large uploads DoS)
    client_max_body_size 10m;

    # Proxy to Next.js
    location / {
        limit_req zone=dashboard burst=20 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running API calls (deal analyzer, etc.)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # SSE endpoint — longer timeout, no buffering
    location /api/events {
        limit_req zone=dashboard burst=5 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE-specific: disable buffering, long timeout
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Block access to sensitive paths
    location ~ /\. {
        deny all;
    }
}

# Block direct IP access (return 444 = drop connection)
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;

    # Self-signed cert for the default server (prevents TLS errors)
    # Generate: openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
    #           -keyout /etc/nginx/ssl/default.key -out /etc/nginx/ssl/default.crt \
    #           -subj '/CN=localhost'
    # ssl_certificate /etc/nginx/ssl/default.crt;
    # ssl_certificate_key /etc/nginx/ssl/default.key;

    return 444;
}
